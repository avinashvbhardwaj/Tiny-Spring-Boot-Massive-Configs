spring.application.name=Spring-Boot-CRUD

#Turn off the Spring-Boot banner
spring.main.banner-mode=off

#JDBC connectivity properties
spring.datasource.url=jdbc:mysql://localhost:3306/student_tracker
spring.datasource.username=springstudent
spring.datasource.password=springstudent#1234

# Reduce the logging level. Set Logging level to warn
logging.level.root=warn

#logging level for hibernate
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace

#Configure JPA/Hibernate to auto create the tables
#drops the table and create the table automatically
########spring.jpa.hibernate.ddl-auto=create

#update config will keep existing data in the table
spring.jpa.hibernate.ddl-auto=update
